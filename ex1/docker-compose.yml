services:
  mongodb:
    build:
      context: ./api_dados
      dockerfile: Dockerfile.mongo
    container_name: mongoEW
    networks:
      - repairs-network

  api:
    build:
      context: ./api_dados
      dockerfile: Dockerfile
    container_name: api_dados
    ports:
      - "16025:16025"
    environment:
      - PORT=16025
      - MONGO_URL=mongodb://mongodb:27017/autoRepair
    depends_on:
      - mongodb
    networks:
      - repairs-network

  interface:
    build:
      context: ../ex2
      dockerfile: Dockerfile
    container_name: interface_repairs
    ports:
      - "16026:16026"
    environment:
      - PORT=16026
      - API_URL=http://api:16025/repairs
    depends_on:
      - api
    networks:
      - repairs-network

networks:
  repairs-network:
    driver: bridge
