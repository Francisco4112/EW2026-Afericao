services:
  mongodb:
    build:
      context: ./api_dados
      dockerfile: Dockerfile.mongo
    container_name: mongoEW
    networks:
      - repairs-network

  api:
    build:
      context: ./api_dados
      dockerfile: Dockerfile
    container_name: api_dados
    ports:
      - "16025:16025"
    environment:
      - PORT=16025
      - MONGO_URL=mongodb://mongodb:27017/autoRepair
    depends_on:
      - mongodb
    networks:
      - repairs-network

networks:
  repairs-network:
    driver: bridge
